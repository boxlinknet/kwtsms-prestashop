services:
  prestashop:
    image: prestashop/prestashop:8.1
    container_name: kwtsms-ps
    depends_on:
      - mysql
    ports:
      - "8088:80"
    environment:
      DB_SERVER: mysql
      DB_NAME: prestashop
      DB_USER: prestashop
      DB_PASSWD: prestashop
      PS_DEV_MODE: 1
      PS_INSTALL_AUTO: 1
      PS_DOMAIN: localhost:8088
      PS_FOLDER_ADMIN: admin123
      ADMIN_MAIL: admin@test.com
      ADMIN_PASSWD: Admin123!
      PS_COUNTRY: KW
      PS_LANGUAGE: en
    volumes:
      - ps_data:/var/www/html
      - ../kwtsms:/var/www/html/modules/kwtsms
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: kwtsms-ps-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prestashop
      MYSQL_USER: prestashop
      MYSQL_PASSWORD: prestashop
    volumes:
      - kwtsms_ps_db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  ps_data:
  kwtsms_ps_db_data:
